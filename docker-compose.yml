services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sep_qdrant
    ports:
      - "6333:6333"   # REST + dashboard (http://localhost:6333/dashboard)
      - "6334:6334"   # gRPC
    volumes:
      - ./vectordb/qdrant_storage:/qdrant/storage   # gitignored (vectordb/)
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: sep_neo4j
    ports:
      - "7474:7474"   # browser (http://localhost:7474)
      - "7687:7687"   # bolt
    environment:
      - NEO4J_AUTH=neo4j/sepgraph123
    volumes:
      - ./data/neo4j:/data   # gitignored (data/)
    restart: unless-stopped
